kind = "web"
previewPath = "/"
title = "Agrishield Industries"
version = "1.0.0"
id = "artifacts/agrishield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22221

[services.development]
run = "pnpm --filter @workspace/agrishield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agrishield", "run", "build" ]
publicDir = "artifacts/agrishield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22221"
BASE_PATH = "/"
